[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "v4-core/=lib/v4-core/",
    "forge-std/=lib/forge-std/src/",
    "reactive-lib/=lib/reactive-lib/src/",
]

no_match_coverage = "script/"

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
unichain_sepolia = "https://sepolia.unichain.org"
ethereum_sepolia = "https://rpc.sepolia.org"
base_sepolia = "https://sepolia.base.org"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
optimism_sepolia = "https://sepolia.optimism.io"
reactive_kopli = "https://kopli-rpc.reactive.network"
reactive_lasna = "https://lasna-rpc.rnk.dev/"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://unichain-sepolia.blockscout.com/api" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
